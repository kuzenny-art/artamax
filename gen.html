
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ID Generator</title>
</head>
<body>

<input type="text" id="type" placeholder="Enter type (e.g. PAINTING)">
<button onclick="generateID()">Generate</button>

<h3 id="code"></h3>

<script>
let counter = localStorage.getItem("counter") ? parseInt(localStorage.getItem("counter")) : 1;

function generateID() {
  const type = document.getElementById("type").value.toUpperCase();
  const number = String(counter).padStart(3, "0");
  document.getElementById("code").innerText = `${type}#${number}.FL3X`;
  
  counter++;
  if (counter > 999) counter = 1;

  localStorage.setItem("counter", counter);
}
</script>

</body>
</html>
